name: Desktop Build

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Generate signing key
        shell: pwsh
        run: |
          $env:PATH = "C:\Users\runneradmin\.cargo\bin;$env:PATH"
          cargo tauri signer generate -w $env:TEMP\tauri.key --password ""
          $key = Get-Content "$env:TEMP\tauri.key" -Raw
          $pub = Get-Content "$env:TEMP\tauri.key.pub" -Raw
          echo "PUBLIC KEY: $pub"
          echo "TAURI_SIGNING_PRIVATE_KEY=$key" >> $env:GITHUB_ENV
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=" >> $env:GITHUB_ENV

      - name: Build
        run: npm run tauri build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ENGINE_URL: ${{ secrets.VITE_ENGINE_URL }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          name: Sovereign OS ${{ github.ref_name }}
          body: See release notes.
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.zip
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip

      - name: Generate latest.json
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag -replace "^v", ""
          $repo    = "${{ github.repository }}"
          Get-ChildItem "src-tauri/target/release/bundle" -Recurse | ForEach-Object { Write-Host $_.FullName }
          $sigFile = Get-ChildItem "src-tauri/target/release/bundle" -Recurse -Filter "*.sig" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $sigFile) { Write-Error "Hic .sig dosyasi bulunamadi"; exit 1 }
          $signature   = (Get-Content $sigFile.FullName -Raw).Trim()
          $zipName     = $sigFile.BaseName
          $downloadUrl = "https://github.com/$repo/releases/download/$tag/$zipName"
          $latestJson = [ordered]@{ version = $version; notes = "See release notes."; pub_date = [System.DateTime]::UtcNow.ToString("yyyy-MM-ddTHH:mm:ssZ"); platforms = [ordered]@{ "windows-x86_64" = [ordered]@{ url = $downloadUrl; signature = $signature } } } | ConvertTo-Json -Depth 5
          $latestJson | Out-File -FilePath "latest.json" -Encoding utf8NoBOM
          gh release upload $tag latest.json --clobber
