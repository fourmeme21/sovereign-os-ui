name: Generate Signing Key

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate keypair
        run: |
          npx @tauri-apps/cli@latest signer generate -w /tmp/tauri.key --password ""
          echo "===== PUBLIC KEY ====="
          cat /tmp/tauri.key.pub
          echo "===== PRIVATE KEY ====="
          cat /tmp/tauri.key
